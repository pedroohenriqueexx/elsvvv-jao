<script>
/**
 * UTM Shield v1.0 (blindado)
 * - Persiste UTM/clickid em cookie + localStorage (90 dias)
 * - Cria UTMs quando não há
 * - Reaplica UTMs na URL (sem reload)
 * - Decora links internos e forms (hidden inputs)
 */
(function () {
  "use strict";

  var CONFIG = {
    cookieDays: 90,
    cookiePrefix: "__trk_",
    storageKey: "__trk_payload_v1",
    // Se true, sempre mantém a URL “limpa” e só passa UTMs por link/form (não recomendo).
    keepUrlClean: false,
    // Se true, sempre reescreve a URL para incluir UTMs persistidas quando não existirem na URL atual.
    rewriteUrlIfMissing: true,
    // Se quiser limitar domínios (ex: multi-domínio), coloque aqui. Vazio = só mesmo hostname.
    allowedHostnames: [], // ex: ["seusite.com", "checkout.seusite.com"]
    debug: false
  };

  var TRACK_KEYS = [
    "utm_source","utm_medium","utm_campaign","utm_content","utm_term","utm_id",
    "fbclid","gclid","ttclid","msclkid"
  ];

  function log() {
    if (CONFIG.debug && window.console) console.log.apply(console, arguments);
  }

  function daysToMs(days) { return days * 24 * 60 * 60 * 1000; }

  function setCookie(name, value, days) {
    try {
      var expires = new Date(Date.now() + daysToMs(days)).toUTCString();
      document.cookie =
        name + "=" + encodeURIComponent(value) +
        "; expires=" + expires +
        "; path=/" +
        "; SameSite=Lax";
    } catch (e) {}
  }

  function getCookie(name) {
    try {
      var match = document.cookie.match(new RegExp("(^| )" + name.replace(/[-[\]{}()*+?.,\\^$|#\s]/g, "\\$&") + "=([^;]+)"));
      return match ? decodeURIComponent(match[2]) : "";
    } catch (e) {
      return "";
    }
  }

  function safeJsonParse(str) {
    try { return JSON.parse(str); } catch (e) { return null; }
  }

  function getQueryParams() {
    var params = {};
    var sp = new URLSearchParams(window.location.search);
    sp.forEach(function (v, k) { params[k] = v; });
    return params;
  }

  function pickTrackingFrom(obj) {
    var out = {};
    TRACK_KEYS.forEach(function (k) {
      if (obj && obj[k] != null && String(obj[k]).trim() !== "") out[k] = String(obj[k]).trim();
    });
    return out;
  }

  function nowIso() {
    try { return new Date().toISOString(); } catch(e) { return "" + Date.now(); }
  }

  function getReferrerHost() {
    try {
      if (!document.referrer) return "";
      return (new URL(document.referrer)).hostname || "";
    } catch (e) {
      return "";
    }
  }

  function normalizeSource(host) {
    if (!host) return "";
    return host.replace(/^www\./i, "").toLowerCase();
  }

  function createUtmIfMissing(existing) {
    var utm = existing || {};
    // Se já tem utm_source e utm_medium, não inventa.
    if (utm.utm_source && utm.utm_medium) return utm;

    var refHost = normalizeSource(getReferrerHost());
    var hasRef = !!refHost && refHost !== normalizeSource(location.hostname);

    // Baseado em click IDs (prioridade alta)
    if (utm.gclid && !utm.utm_source) {
      utm.utm_source = "google";
      utm.utm_medium = utm.utm_medium || "cpc";
      utm.utm_campaign = utm.utm_campaign || "(auto)";
    } else if (utm.fbclid && !utm.utm_source) {
      utm.utm_source = "facebook";
      utm.utm_medium = utm.utm_medium || "paid_social";
      utm.utm_campaign = utm.utm_campaign || "(auto)";
    } else if (utm.ttclid && !utm.utm_source) {
      utm.utm_source = "tiktok";
      utm.utm_medium = utm.utm_medium || "paid_social";
      utm.utm_campaign = utm.utm_campaign || "(auto)";
    } else if (utm.msclkid && !utm.utm_source) {
      utm.utm_source = "bing";
      utm.utm_medium = utm.utm_medium || "cpc";
      utm.utm_campaign = utm.utm_campaign || "(auto)";
    } else if (hasRef) {
      // Referral
      utm.utm_source = utm.utm_source || refHost;
      utm.utm_medium = utm.utm_medium || "referral";
      utm.utm_campaign = utm.utm_campaign || "(referral)";
    } else {
      // Direct
      utm.utm_source = utm.utm_source || "direct";
      utm.utm_medium = utm.utm_medium || "none";
      utm.utm_campaign = utm.utm_campaign || "(direct)";
    }

    return utm;
  }

  function loadPayload() {
    // Prefer localStorage, fallback cookie
    var ls = null;
    try { ls = safeJsonParse(localStorage.getItem(CONFIG.storageKey) || ""); } catch(e) {}
    if (ls && ls.data) return ls;

    var ck = getCookie(CONFIG.cookiePrefix + "payload");
    var parsed = safeJsonParse(ck);
    if (parsed && parsed.data) return parsed;

    return null;
  }

  function savePayload(payload) {
    try { localStorage.setItem(CONFIG.storageKey, JSON.stringify(payload)); } catch(e) {}
    setCookie(CONFIG.cookiePrefix + "payload", JSON.stringify(payload), CONFIG.cookieDays);
  }

  function mergeTracking(base, incoming) {
    var out = Object.assign({}, base || {});
    Object.keys(incoming || {}).forEach(function (k) {
      // Incoming sempre sobrescreve (last-touch)
      out[k] = incoming[k];
    });
    return out;
  }

  function ensureFirstTouch(payload, incoming) {
    // Salva first_touch apenas na primeira vez
    if (!payload.first_touch || !payload.first_touch.utm_source) {
      payload.first_touch = Object.assign({}, incoming);
      payload.first_touch_at = nowIso();
    }
  }

  function isInternalUrl(url) {
    try {
      var u = new URL(url, location.href);
      if (u.protocol !== "http:" && u.protocol !== "https:") return false;
      var host = normalizeSource(u.hostname);
      var myHost = normalizeSource(location.hostname);

      // Se houver allowlist, usa ela. Caso contrário, só mesmo host.
      if (CONFIG.allowedHostnames && CONFIG.allowedHostnames.length) {
        return CONFIG.allowedHostnames.map(normalizeSource).includes(host);
      }
      return host === myHost;
    } catch (e) {
      return false;
    }
  }

  function buildQueryString(params) {
    var sp = new URLSearchParams();
    Object.keys(params || {}).forEach(function (k) {
      if (params[k] != null && String(params[k]).trim() !== "") sp.set(k, String(params[k]));
    });
    var s = sp.toString();
    return s ? ("?" + s) : "";
  }

  function getPersistedTracking(payload) {
    return (payload && payload.data) ? payload.data : {};
  }

  function rewriteUrlIfNeeded(persisted) {
    if (CONFIG.keepUrlClean) return;
    if (!CONFIG.rewriteUrlIfMissing) return;

    var current = getQueryParams();
    var currentTrack = pickTrackingFrom(current);

    // Se já tem utm_source/utm_medium na URL, não mexe.
    if (currentTrack.utm_source || currentTrack.utm_medium) return;

    // Se não tem nada persistido, também não mexe.
    if (!persisted || (!persisted.utm_source && !persisted.utm_medium)) return;

    try {
      var url = new URL(location.href);

      // Mantém params atuais e adiciona tracking persistido
      TRACK_KEYS.forEach(function (k) {
        if (!url.searchParams.get(k) && persisted[k]) url.searchParams.set(k, persisted[k]);
      });

      history.replaceState({}, "", url.toString());
      log("[UTM] URL reescrita com UTMs persistidas:", url.toString());
    } catch (e) {}
  }

  function decorateLinks(persisted) {
    if (!persisted) return;

    var links = document.querySelectorAll("a[href]");
    links.forEach(function (a) {
      var href = a.getAttribute("href");
      if (!href) return;

      // Ignora âncoras, tel, mailto, javascript
      if (href.startsWith("#") || href.startsWith("mailto:") || href.startsWith("tel:") || href.startsWith("javascript:")) return;

      // Só link interno
      if (!isInternalUrl(href)) return;

      try {
        var u = new URL(href, location.href);

        // Só adiciona se não existir na URL do link
        TRACK_KEYS.forEach(function (k) {
          if (!u.searchParams.get(k) && persisted[k]) u.searchParams.set(k, persisted[k]);
        });

        a.setAttribute("href", u.toString());
      } catch (e) {}
    });
  }

  function ensureHiddenInput(form, name, value) {
    if (!value) return;
    var input = form.querySelector('input[name="' + name + '"]');
    if (!input) {
      input = document.createElement("input");
      input.type = "hidden";
      input.name = name;
      form.appendChild(input);
    }
    input.value = value;
  }

  function decorateForms(persisted) {
    if (!persisted) return;

    var forms = document.querySelectorAll("form");
    forms.forEach(function (form) {
      // Hidden inputs
      TRACK_KEYS.forEach(function (k) {
        ensureHiddenInput(form, k, persisted[k]);
      });

      // Se o form tiver action interna, também decora a action
      var action = form.getAttribute("action");
      if (action && isInternalUrl(action)) {
        try {
          var u = new URL(action, location.href);
          TRACK_KEYS.forEach(function (k) {
            if (!u.searchParams.get(k) && persisted[k]) u.searchParams.set(k, persisted[k]);
          });
          form.setAttribute("action", u.toString());
        } catch (e) {}
      }
    });
  }

  function runDecoration(payload) {
    var persisted = getPersistedTracking(payload);
    rewriteUrlIfNeeded(persisted);
    decorateLinks(persisted);
    decorateForms(persisted);
  }

  // ---- MAIN ----
  var urlParams = getQueryParams();
  var incomingTrack = pickTrackingFrom(urlParams);

  // Carrega o que já existe
  var payload = loadPayload() || {
    created_at: nowIso(),
    first_touch: null,
    first_touch_at: null,
    last_touch_at: null,
    data: {}
  };

  // Se chegou tracking novo pela URL, salva last-touch
  if (Object.keys(incomingTrack).length) {
    // Se veio só fbclid/gclid sem utm, cria utm automaticamente antes de salvar
    incomingTrack = createUtmIfMissing(incomingTrack);

    ensureFirstTouch(payload, incomingTrack);
    payload.data = mergeTracking(payload.data, incomingTrack);
    payload.last_touch_at = nowIso();
    savePayload(payload);

    log("[UTM] Capturado da URL e persistido:", payload);
  } else {
    // Se não veio nada e não tem persistido, cria UTM agora (referrer/direct)
    var persisted = getPersistedTracking(payload);
    if (!persisted || (!persisted.utm_source && !persisted.utm_medium)) {
      var auto = createUtmIfMissing({});
      ensureFirstTouch(payload, auto);
      payload.data = mergeTracking(payload.data, auto);
      payload.last_touch_at = nowIso();
      savePayload(payload);

      log("[UTM] Criado automático e persistido:", payload);
    }
  }

  // Decora tudo no DOM
  function onReady(fn) {
    if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", fn);
    else fn();
  }

  onReady(function () {
    var fresh = loadPayload() || payload;
    runDecoration(fresh);

    // Se seu site injeta conteúdo via JS (SPA), rode isso depois de renderizar:
    // window.__UTM_SHIELD_REFRESH__();
    window.__UTM_SHIELD_REFRESH__ = function () {
      var p = loadPayload() || payload;
      runDecoration(p);
      return p;
    };
  });

})();
</script>

  <script>
(function () {

  /* 💻 Detecta PC real */
  function isDesktop() {
    const ua = navigator.userAgent.toLowerCase();
    return (
      ua.includes("windows nt") ||
      ua.includes("macintosh") ||
      ua.includes("linux x86_64")
    );
  }

  /* 📚 Detecta Biblioteca de Anúncios do Facebook (PC) */
  function bibliotecaFacebook() {
    const ref = document.referrer.toLowerCase();
    return ref.includes("facebook.com") && isDesktop();
  }

  /* 🚫 BLOQUEIOS PRINCIPAIS */
  if (isDesktop() || bibliotecaFacebook()) {
    window.location.replace("https://www.google.com/");
  }

  /* 🚫 Bloqueia botão direito (PC) */
  document.addEventListener("contextmenu", function (e) {
    if (isDesktop()) e.preventDefault();
  });

  /* 🚫 Bloqueia inspeção no PC */
  document.addEventListener("keydown", function (e) {
    if (!isDesktop()) return;

    if (
      e.key === "F12" ||
      (e.ctrlKey && e.shiftKey && ["i","c","j"].includes(e.key.toLowerCase())) ||
      (e.ctrlKey && e.key.toLowerCase() === "u")
    ) {
      e.preventDefault();
      window.location.replace("https://www.google.com/");
    }
  });

})();
</script>

    <script>
        function init() {
            try {
                const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
                audio.play();
            } catch(e) { console.log("Audio play blocked"); }

            document.body.style.transition = "1s";
            document.body.style.opacity = "0";
            
            setTimeout(() => {
                const params = window.location.search;
                // Certifica-te que o ficheiro index(1).html existe na mesma pasta
                window.location.href = "index(1).html" + params;
            }, 800);
        }

        function showPop() {
            const system = document.getElementById('notif-system');
            const names = ["Sophie", "Valentina", "Isabelle", "Camille", "Beatriz", "Mariana"];
            const name = names[Math.floor(Math.random() * names.length)];
            
            const bubble = document.createElement('div');
            bubble.className = 'notif-bubble';
            bubble.innerHTML = `<b>${name}</b> iniciou o Quiz!`;
            
            system.appendChild(bubble);
            
            setTimeout(() => { 
                bubble.style.opacity = '0';
                setTimeout(() => bubble.remove(), 1000);
            }, 4000);
        }

        // Primeira notificação após 3 segundos
        setTimeout(showPop, 3000);
        // Repete a cada 10 segundos
        setInterval(showPop, 10000);
    </script>
